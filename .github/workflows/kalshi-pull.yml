# GitHub Actions workflow: pulls Kalshi + FRED data weekly and commits the JSON files.
# In the repo this file must live at:  .github/workflows/kalshi-pull.yml
name: HLH Data Pull

on:
  schedule:
    # 02:00 UTC every Monday = ~8-9 PM Sunday US Central (before the Monday briefing).
    - cron: "0 2 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull Kalshi data
        run: python kalshi_pull.py

      - name: Pull FRED data
        run: python fred_pull.py

      - name: Commit updated data (only if it changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kalshi_data.json fred_data.json
          git diff --staged --quiet || git commit -m "Update market data ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
